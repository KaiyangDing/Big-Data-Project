services:

  # ─────────────────────────────────────────
  # Jupyter Lab + PySpark (Spark local mode)
  #
  # The pyspark-notebook image ships with Spark 3.5.0 built in.
  # Spark runs in local[*] mode inside this single container,
  # which is sufficient for our dataset size (~37M flight records).
  # No separate master/worker needed.
  # ─────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: skypath-jupyter
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=bigdata2024
      - SPARK_OPTS=--driver-memory 8g
    ports:
      - "8888:8888"   # Jupyter Lab
      - "4040:4040"   # Spark UI (visible while a Spark job is running)
    volumes:
      - ./data:/data
      - ./src:/src
      - ./notebooks:/notebooks
      - ./results:/results
      - ./models:/models
      - ./docs:/docs
