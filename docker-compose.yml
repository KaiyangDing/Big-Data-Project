services:

  # ─────────────────────────────────────────
  # Jupyter Lab + PySpark (Spark local mode)
  #
  # The pyspark-notebook image ships with Spark 3.5.0 built in.
  # Spark runs in local[*] mode inside this single container,
  # which is sufficient for our dataset size (~37M flight records).
  # No separate master/worker needed.
  # ─────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: skypath-jupyter
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=bigdata2024
      - SPARK_OPTS=--driver-memory 8g
    ports:
      - "8888:8888"   # Jupyter Lab
      - "4040:4040"   # Spark UI (visible while a Spark job is running)
    volumes:
      - ./data:/data
      - ./src:/src
      - ./notebooks:/notebooks
      - ./results:/results
      - ./models:/models
      - ./docs:/docs
    # Symlink the mounted dirs into /home/jovyan so they show up in the
    # Jupyter Lab file browser (which is rooted at /home/jovyan).
    # Absolute paths like /data/... still work for any script that uses them.
    command: >
      bash -c "
      for d in data src notebooks results models docs; do
        ln -sfn /$$d /home/jovyan/$$d;
      done &&
      exec start-notebook.sh
      "

  skypath-mongo:
    image: mongo:7
    container_name: skypath-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  skypath-api:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: skypath-api
    working_dir: /api
    command: >
      bash -c "pip install fastapi 'uvicorn[standard]' pymongo pydantic --quiet &&
               uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./api:/api
      - ./models:/models
      - ./results:/results
    depends_on:
      - skypath-mongo
    environment:
      - MONGO_URI=mongodb://skypath-mongo:27017/
      - SPARK_HOME=/usr/local/spark-3.5.0-bin-hadoop3
      - PYTHONPATH=/usr/local/spark-3.5.0-bin-hadoop3/python:/usr/local/spark-3.5.0-bin-hadoop3/python/lib/py4j-0.10.9.7-src.zip
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

volumes:
  mongo_data:
